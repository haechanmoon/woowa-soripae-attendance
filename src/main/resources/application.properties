spring.application.name=attendance

# --- Datasource (MySQL) ---
# MVP: override via environment variables in deployment (do not commit real credentials)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/soripae_attendance?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA ---
# Schema is managed by Flyway migrations (db/migration); Hibernate only validates the mapping matches.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Seoul

# --- Flyway ---
# baseline-on-migrate: existing DBs (already created via ddl-auto=update) are marked as
# already at baseline-version without re-running V1, since their schema already matches it.
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

# --- Static resources (html/js/css) ---
# Cache-Control: no-cache 를 붙여 브라우저가 캐시를 쓰기 전에 매번 서버에 재검증(조건부 GET)하게 한다.
# 헤더가 없으면 브라우저가 휴리스틱으로 파일을 오래 캐싱해, 새 버전을 배포해도 옛 JS를 계속 써서
# 존재하지 않는 옛 API 경로를 부르는(예: /api/events 404) 문제가 생긴다. no-cache면 변경 없을 땐 304로 값싸게 끝난다.
spring.web.resources.cache.cachecontrol.no-cache=true

# --- File upload (attendance photos) ---
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.file.upload-dir=${UPLOAD_DIR:./uploads}
app.file.base-url=${UPLOAD_BASE_URL:/uploads}

# --- Club policy ---
app.attendance.core-time-start=13:00
app.attendance.core-time-end=15:00
app.attendance.late-fine-per-minute=100
app.attendance.absent-fine=6000
app.attendance.absent-threshold-minutes=60

# --- Admin ---
# MVP shortcut: single shared password, no per-admin accounts. See API notes for follow-up hardening.
app.admin.password=${ADMIN_PASSWORD:1216}
